<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ $code . ' - ' . $message }}</title>
    <style>
        :root {
            --brand: #ffa500;
            --bg: #1a1a1a;
            --panel: #111;
            --text: #e0e0e0;
            --muted: #b5b5b5;
            --border: #2a2a2a;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--brand);
            font-family: monospace;
        }

        .container {
            max-width: 900px;
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 40px 20px;
            background: var(--panel);
            text-align: center;
        }

        .main-text {
            font-size: clamp(2rem, 10vw, 8rem);
            font-weight: bold;
            margin: 0;
            line-height: 1;
        }

        .secondary-text {
            font-size: clamp(1rem, 2vw, 1.5rem);
            color: var(--text);
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-text">{{ $code }}</div>
        <div class="secondary-text">{{ $message }}</div>
    </div>
</body>
</html>
